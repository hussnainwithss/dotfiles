# tmux.conf — linked to ~/.config/tmux/tmux.conf
# Requires TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# After first load: prefix + I  to install plugins

# ── Prefix: Ctrl-a ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 10          # faster key sequences
set -g focus-events on
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Shell ─────────────────────────────────────────────────────────────────────
# Use fish if available, else zsh, else bash
if-shell "command -v fish" "set -g default-shell $(command -v fish)" ""

# ── Vim-style pane navigation ─────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Split panes (keep current path) ───────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Resize panes ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Copy mode (vi keys) ───────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#45475a] │ "
set -g status-right "#[fg=#a6adc8] %H:%M  %d %b #[fg=#45475a]│ #[fg=#89b4fa] #h "

setw -g window-status-format         "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#cdd6f4,bold,bg=#313244] #I:#W "

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style            "bg=#313244,fg=#cdd6f4"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # persist sessions across reboot
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'        # system clipboard copy
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
